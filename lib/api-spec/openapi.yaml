openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: majors
    description: College major lookup
  - name: me
    description: Current user profile
  - name: my-colleges
    description: Saved colleges for the current user
  - name: colleges
    description: College reference data (official deadlines)
  - name: admin
    description: Admin-only statistics and user data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /majors/lookup:
    post:
      operationId: lookupMajor
      tags: [majors]
      summary: Look up a college major
      description: Returns a description and a ranked list of top colleges for a given major
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MajorLookupRequest"
      responses:
        "200":
          description: Major info and top colleges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MajorLookupResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /majors/curriculum:
    post:
      operationId: getMajorCurriculum
      tags: [majors]
      summary: Get 4-year curriculum for a major at a specific college
      description: Returns a year-by-year course breakdown for a major at a specific college
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurriculumRequest"
      responses:
        "200":
          description: 4-year curriculum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurriculumResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /careers:
    get:
      operationId: getCareers
      tags: [majors]
      summary: List all careers with BLS data
      description: Returns the full catalog of occupations with BLS salary, projected job growth, and typical education
      responses:
        "200":
          description: List of careers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerInfo"
  /chat:
    post:
      operationId: chat
      tags: [chat]
      summary: Chat with AI advisor
      description: Send a conversation history and receive an AI response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user profile
      description: Returns the signed-in user's profile, including grade level and admin flag
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMe
      tags: [me]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /colleges/deadlines:
    post:
      operationId: getCollegeDeadlines
      tags: [colleges]
      summary: Get official application deadlines for a college
      description: >-
        Returns the college's official Early Decision, Regular Decision, and
        FAFSA/financial-aid priority deadlines for the upcoming admission
        cycle, researched from the college's own website and other reliable
        sources. Results are cached server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollegeDeadlinesRequest"
      responses:
        "200":
          description: Official deadlines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollegeDeadlines"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Deadline research failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /my-colleges:
    get:
      operationId: listMyColleges
      tags: [my-colleges]
      summary: List the current user's saved colleges
      responses:
        "200":
          description: Saved colleges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MyCollegeItem"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createMyCollege
      tags: [my-colleges]
      summary: Save a college to My Colleges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyCollegeInput"
      responses:
        "201":
          description: Saved college
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyCollegeItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /my-colleges/import:
    post:
      operationId: importMyColleges
      tags: [my-colleges]
      summary: Bulk import saved colleges (idempotent)
      description: Imports previously device-stored colleges; duplicates are skipped
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyCollegeImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /my-colleges/{id}:
    patch:
      operationId: updateMyCollege
      tags: [my-colleges]
      summary: Update a saved college (status, notes, deadlines)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyCollegeUpdate"
      responses:
        "200":
          description: Updated saved college
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyCollegeItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMyCollege
      tags: [my-colleges]
      summary: Remove a saved college
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Aggregate user statistics (admin only)
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /saved-majors:
    get:
      operationId: listSavedMajors
      tags: [saved-majors]
      summary: List the current user's saved (bookmarked) majors
      responses:
        "200":
          description: Saved majors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedMajorItem"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertSavedMajor
      tags: [saved-majors]
      summary: Create or replace a saved major (by name) for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedMajorUpsert"
      responses:
        "200":
          description: Saved major
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedMajorItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /saved-majors/import:
    post:
      operationId: importSavedMajors
      tags: [saved-majors]
      summary: Bulk import saved majors (idempotent)
      description: Imports previously device-stored majors; existing majors are skipped
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedMajorImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /saved-majors/{id}:
    delete:
      operationId: deleteSavedMajor
      tags: [saved-majors]
      summary: Remove a saved major
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MajorLookupRequest:
      type: object
      properties:
        major:
          type: string
          minLength: 1
          maxLength: 120
          description: The college major to look up
      required:
        - major
    AdmissionsProfile:
      type: object
      description: Estimated admissions selectivity used to compute Reach/Match/Safety
      properties:
        gpaLow:
          type: ["number", "null"]
          description: Lower bound of typical admitted GPA (≈25th percentile, 0-4 scale)
        gpaHigh:
          type: ["number", "null"]
          description: Upper bound of typical admitted GPA (≈75th percentile, 0-4 scale)
        satLow:
          type: ["integer", "null"]
          description: Lower bound of typical admitted SAT total (≈25th percentile, 400-1600)
        satHigh:
          type: ["integer", "null"]
          description: Upper bound of typical admitted SAT total (≈75th percentile, 400-1600)
        actLow:
          type: ["integer", "null"]
          description: Lower bound of typical admitted ACT composite (≈25th percentile, 1-36)
        actHigh:
          type: ["integer", "null"]
          description: Upper bound of typical admitted ACT composite (≈75th percentile, 1-36)
        selectivityTier:
          type: string
          enum: [most_selective, highly_selective, selective, accessible]
      required:
        - selectivityTier
    College:
      type: object
      properties:
        rank:
          type: integer
        name:
          type: string
        location:
          type: string
        highlights:
          type: string
        admissionsProfile:
          $ref: "#/components/schemas/AdmissionsProfile"
      required:
        - rank
        - name
        - location
        - highlights
    CareerInfo:
      type: object
      description: Real occupation data from the U.S. Bureau of Labor Statistics
      properties:
        occupation:
          type: string
        socCode:
          type: string
        annualMedianWage:
          type: integer
        annualEntryWage:
          type: integer
        annualExperiencedWage:
          type: integer
        projectedGrowthPct:
          type: number
        typicalEducation:
          type: string
        sourceName:
          type: string
        sourceUrl:
          type: string
        wageDataYear:
          type: string
        growthDataPeriod:
          type: string
      required:
        - occupation
        - socCode
        - annualMedianWage
        - annualEntryWage
        - annualExperiencedWage
        - projectedGrowthPct
        - typicalEducation
        - sourceName
        - sourceUrl
        - wageDataYear
        - growthDataPeriod
    MajorLookupResponse:
      type: object
      properties:
        major:
          type: string
        description:
          type: string
        career:
          anyOf:
            - $ref: "#/components/schemas/CareerInfo"
            - type: "null"
          description: Real BLS career data, or null when no matching occupation was found
        topColleges:
          type: array
          items:
            $ref: "#/components/schemas/College"
      required:
        - major
        - description
        - career
        - topColleges
    CurriculumRequest:
      type: object
      properties:
        major:
          type: string
          minLength: 1
          maxLength: 120
          description: The college major
        college:
          type: string
          minLength: 1
          maxLength: 200
          description: The college name
      required:
        - major
        - college
    Course:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description
    YearPlan:
      type: object
      properties:
        year:
          type: integer
        label:
          type: string
        focus:
          type: string
        courses:
          type: array
          items:
            $ref: "#/components/schemas/Course"
      required:
        - year
        - label
        - focus
        - courses
    CurriculumResponse:
      type: object
      properties:
        major:
          type: string
        college:
          type: string
        years:
          type: array
          items:
            $ref: "#/components/schemas/YearPlan"
      required:
        - major
        - college
        - years
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          maxLength: 4000
      required:
        - role
        - content
    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages
    ChatReply:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MajorSuggestion:
      type: object
      description: A quiz-suggested major with the reason it was recommended
      properties:
        major:
          type: string
          maxLength: 200
        reason:
          type: string
          maxLength: 1000
      required:
        - major
        - reason
    Me:
      type: object
      properties:
        userId:
          type: string
        email:
          type: ["string", "null"]
        gradeLevel:
          type: ["integer", "null"]
          description: High school grade level (9-12)
        gpa:
          type: ["number", "null"]
          description: High school GPA (0-5 scale, weighted allowed)
        sat:
          type: ["integer", "null"]
          description: SAT total score (400-1600)
        act:
          type: ["integer", "null"]
          description: ACT composite score (1-36)
        goals:
          type: string
          description: The student's stated goals / target schools
        quizResults:
          type: array
          items:
            $ref: "#/components/schemas/MajorSuggestion"
          description: Latest interest-quiz major suggestions
        quizDone:
          type: boolean
          description: Whether the user has completed or dismissed the interest quiz
        isAdmin:
          type: boolean
      required:
        - userId
        - email
        - gradeLevel
        - gpa
        - sat
        - act
        - goals
        - quizResults
        - quizDone
        - isAdmin
    ProfileUpdate:
      type: object
      properties:
        gradeLevel:
          type: ["integer", "null"]
          minimum: 9
          maximum: 12
          description: High school grade level (9-12), or null to clear
        gpa:
          type: ["number", "null"]
          minimum: 0
          maximum: 5
          description: High school GPA (0-5 scale), or null to clear
        sat:
          type: ["integer", "null"]
          minimum: 400
          maximum: 1600
          description: SAT total score, or null to clear
        act:
          type: ["integer", "null"]
          minimum: 1
          maximum: 36
          description: ACT composite score, or null to clear
        goals:
          type: string
          maxLength: 500
          description: The student's stated goals / target schools
        quizResults:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/MajorSuggestion"
          description: Latest interest-quiz major suggestions
        quizDone:
          type: boolean
          description: Whether the user has completed or dismissed the interest quiz
    ApplicationStatus:
      type: string
      enum: [not_applied, applied, interviewed, accepted, rejected, waitlisted]
    MyCollegeItem:
      type: object
      properties:
        id:
          type: integer
        major:
          type: string
        collegeName:
          type: string
        applicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
        notes:
          type: string
        earlyDecisionDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Calendar date as YYYY-MM-DD
        regularDecisionDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Calendar date as YYYY-MM-DD
        fafsaDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Calendar date as YYYY-MM-DD
        college:
          $ref: "#/components/schemas/College"
        savedAt:
          type: string
          description: ISO timestamp when the college was saved
      required:
        - id
        - major
        - collegeName
        - applicationStatus
        - notes
        - earlyDecisionDeadline
        - regularDecisionDeadline
        - fafsaDeadline
        - college
        - savedAt
    MyCollegeInput:
      type: object
      properties:
        major:
          type: string
          minLength: 1
        collegeName:
          type: string
          minLength: 1
        college:
          $ref: "#/components/schemas/College"
      required:
        - major
        - collegeName
        - college
    MyCollegeUpdate:
      type: object
      properties:
        applicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
        notes:
          type: string
          maxLength: 5000
        earlyDecisionDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
        regularDecisionDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
        fafsaDeadline:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
    CollegeDeadlinesRequest:
      type: object
      properties:
        collegeName:
          type: string
          minLength: 1
          maxLength: 200
      required:
        - collegeName
    DeadlineSource:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
      required:
        - title
        - url
    CollegeDeadlines:
      type: object
      properties:
        collegeName:
          type: string
        cycle:
          type: string
          description: Admission cycle the dates apply to (e.g. "Fall 2027 entry")
        earlyDecision:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Early Decision (or Early Action, see notes) deadline as YYYY-MM-DD
        regularDecision:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Regular Decision deadline as YYYY-MM-DD
        fafsa:
          type: ["string", "null"]
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: FAFSA / financial aid priority deadline as YYYY-MM-DD
        notes:
          type: string
          description: Short caveats, e.g. "offers Early Action instead of Early Decision"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/DeadlineSource"
        fetchedAt:
          type: string
          description: ISO timestamp when the data was researched
      required:
        - collegeName
        - cycle
        - earlyDecision
        - regularDecision
        - fafsa
        - notes
        - sources
        - fetchedAt
    MyCollegeImportInput:
      type: object
      properties:
        items:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/MyCollegeInput"
      required:
        - items
    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
      required:
        - imported
        - skipped
    SavedCollege:
      description: A College snapshot plus when it was bookmarked
      allOf:
        - $ref: "#/components/schemas/College"
        - type: object
          properties:
            savedAt:
              type: number
              description: Epoch milliseconds when the college was bookmarked
          required:
            - savedAt
    SavedMajorItem:
      type: object
      properties:
        id:
          type: integer
        majorName:
          type: string
        description:
          type: string
        career:
          anyOf:
            - $ref: "#/components/schemas/CareerInfo"
            - type: "null"
          description: Real BLS career data captured at save time, or null
        colleges:
          type: array
          items:
