openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: majors
    description: College major lookup
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /majors/lookup:
    post:
      operationId: lookupMajor
      tags: [majors]
      summary: Look up a college major
      description: Returns a description and top 10 colleges for a given major
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MajorLookupRequest"
      responses:
        "200":
          description: Major info and top colleges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MajorLookupResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /majors/curriculum:
    post:
      operationId: getMajorCurriculum
      tags: [majors]
      summary: Get 4-year curriculum for a major at a specific college
      description: Returns a year-by-year course breakdown for a major at a specific college
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurriculumRequest"
      responses:
        "200":
          description: 4-year curriculum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurriculumResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /careers:
    get:
      operationId: getCareers
      tags: [majors]
      summary: List all careers with BLS data
      description: Returns the full catalog of occupations with BLS salary, projected job growth, and typical education
      responses:
        "200":
          description: List of careers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerInfo"
  /chat:
    post:
      operationId: chat
      tags: [chat]
      summary: Chat with AI advisor
      description: Send a conversation history and receive an AI response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MajorLookupRequest:
      type: object
      properties:
        major:
          type: string
          description: The college major to look up
      required:
        - major
    AdmissionsProfile:
      type: object
      description: Estimated admissions selectivity used to compute Reach/Match/Safety
      properties:
        gpaLow:
          type: ["number", "null"]
          description: Lower bound of typical admitted GPA (≈25th percentile, 0-4 scale)
        gpaHigh:
          type: ["number", "null"]
          description: Upper bound of typical admitted GPA (≈75th percentile, 0-4 scale)
        satLow:
          type: ["integer", "null"]
          description: Lower bound of typical admitted SAT total (≈25th percentile, 400-1600)
        satHigh:
          type: ["integer", "null"]
          description: Upper bound of typical admitted SAT total (≈75th percentile, 400-1600)
        actLow:
          type: ["integer", "null"]
          description: Lower bound of typical admitted ACT composite (≈25th percentile, 1-36)
        actHigh:
          type: ["integer", "null"]
          description: Upper bound of typical admitted ACT composite (≈75th percentile, 1-36)
        selectivityTier:
          type: string
          enum: [most_selective, highly_selective, selective, accessible]
      required:
        - selectivityTier
    College:
      type: object
      properties:
        rank:
          type: integer
        name:
          type: string
        location:
          type: string
        highlights:
          type: string
        admissionsProfile:
          $ref: "#/components/schemas/AdmissionsProfile"
      required:
        - rank
        - name
        - location
        - highlights
    CareerInfo:
      type: object
      description: Real occupation data from the U.S. Bureau of Labor Statistics
      properties:
        occupation:
          type: string
        socCode:
          type: string
        annualMedianWage:
          type: integer
        annualEntryWage:
          type: integer
        annualExperiencedWage:
          type: integer
        projectedGrowthPct:
          type: number
        typicalEducation:
          type: string
        sourceName:
          type: string
        sourceUrl:
          type: string
        wageDataYear:
          type: string
        growthDataPeriod:
          type: string
      required:
        - occupation
        - socCode
        - annualMedianWage
        - annualEntryWage
        - annualExperiencedWage
        - projectedGrowthPct
        - typicalEducation
        - sourceName
        - sourceUrl
        - wageDataYear
        - growthDataPeriod
    MajorLookupResponse:
      type: object
      properties:
        major:
          type: string
        description:
          type: string
        career:
          anyOf:
            - $ref: "#/components/schemas/CareerInfo"
            - type: "null"
          description: Real BLS career data, or null when no matching occupation was found
        topColleges:
          type: array
          items:
            $ref: "#/components/schemas/College"
      required:
        - major
        - description
        - career
        - topColleges
    CurriculumRequest:
      type: object
      properties:
        major:
          type: string
          description: The college major
        college:
          type: string
          description: The college name
      required:
        - major
        - college
    Course:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description
    YearPlan:
      type: object
      properties:
        year:
          type: integer
        label:
          type: string
        focus:
          type: string
        courses:
          type: array
          items:
            $ref: "#/components/schemas/Course"
      required:
        - year
        - label
        - focus
        - courses
    CurriculumResponse:
      type: object
      properties:
        major:
          type: string
        college:
          type: string
        years:
          type: array
          items:
            $ref: "#/components/schemas/YearPlan"
      required:
        - major
        - college
        - years
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages
    ChatReply:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
